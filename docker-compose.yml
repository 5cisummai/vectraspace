services:
  app:
    build:
      context: ./app
    env_file:
      - ./app/.env
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      QDRANT_URL: http://qdrant:6333
    ports:
      - "3000:3000"
    depends_on:
      - qdrant
      - embedding-host
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  embedding-host:
    build:
      context: ./embedding-host
    env_file:
      - ./app/.env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  qdrant-data: